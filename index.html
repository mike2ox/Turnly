<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talk Turn Timer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"
    />
    <style>
      :root {
        --bg: #0f0f0e;
        --bg2: #1a1a18;
        --bg3: #242421;
        --bg4: #2e2e2a;
        --line: rgba(255, 255, 255, 0.08);
        --line2: rgba(255, 255, 255, 0.14);
        --text: #f0ede6;
        --text2: #8a8780;
        --text3: #555450;
        --accent: #c8f060;
        --accent2: #60c8f0;
        --red: #f06060;
        --amber: #f0b060;
        --mono: "DM Mono", monospace;
        --sans: "Noto Sans KR", sans-serif;
        --r: 6px;
        --r2: 10px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        font-size: 14px;
        line-height: 1.6;
        min-height: 100vh;
      }

      /* ── layout ── */
      .app {
        max-width: 680px;
        margin: 0 auto;
        padding: 0 1rem 5rem;
      }

      /* ── header ── */
      header {
        padding: 2rem 0 1.5rem;
        display: flex;
        align-items: baseline;
        gap: 0.75rem;
        border-bottom: 0.5px solid var(--line);
        margin-bottom: 1.5rem;
      }
      .logo {
        font-family: var(--mono);
        font-size: 13px;
        font-weight: 400;
        color: var(--accent);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .logo-sep {
        color: var(--text3);
        font-family: var(--mono);
      }
      .logo-sub {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text3);
      }

      /* ── total bar ── */
      .total-bar {
        background: var(--bg2);
        border: 0.5px solid var(--line);
        border-radius: var(--r2);
        padding: 1rem 1.25rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1rem;
        position: relative;
        overflow: hidden;
      }
      .total-bar::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: var(--accent);
        border-radius: 2px 0 0 2px;
        transition: background 0.4s;
      }
      .total-bar.over::before {
        background: var(--red);
      }
      .total-bar.done::before {
        background: var(--text3);
      }
      .total-label {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text3);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      .total-time {
        font-family: var(--mono);
        font-size: 32px;
        font-weight: 300;
        letter-spacing: 0.06em;
        line-height: 1;
      }
      .status-pill {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 4px 10px;
        border-radius: 20px;
        border: 0.5px solid var(--line2);
        color: var(--text2);
        background: var(--bg3);
        transition: all 0.3s;
      }
      .status-pill.active {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(200, 240, 96, 0.07);
      }
      .status-pill.over {
        border-color: var(--red);
        color: var(--red);
        background: rgba(240, 96, 96, 0.07);
      }
      .status-pill.paused {
        border-color: var(--amber);
        color: var(--amber);
        background: rgba(240, 176, 96, 0.07);
      }

      /* ── current item banner ── */
      .current-item {
        background: var(--bg2);
        border: 0.5px solid var(--line);
        border-radius: var(--r2);
        padding: 0.875rem 1.25rem;
        margin-bottom: 1rem;
        display: none;
        align-items: center;
        gap: 0.75rem;
      }
      .current-item.visible {
        display: flex;
      }
      .ci-index {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text3);
        background: var(--bg3);
        border-radius: 4px;
        padding: 2px 7px;
        white-space: nowrap;
      }
      .ci-name {
        font-size: 14px;
        font-weight: 500;
        flex: 1;
      }
      .ci-time {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text2);
        white-space: nowrap;
      }

      /* ── clocks ── */
      .clocks-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-bottom: 1rem;
      }
      .clock-card {
        background: var(--bg2);
        border: 0.5px solid var(--line);
        border-radius: var(--r2);
        padding: 1.25rem 1rem;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .clabel {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text3);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 0.75rem;
      }
      .csub {
        font-family: var(--mono);
        font-size: 13px;
        color: var(--text2);
        margin-top: 0.5rem;
        letter-spacing: 0.04em;
      }

      /* analog clock */
      svg.analog {
        overflow: visible;
        display: block;
      }

      .overtime-display {
        font-family: var(--mono);
        font-size: 40px;
        font-weight: 300;
        color: var(--red);
        letter-spacing: 0.06em;
        margin: 0.5rem 0;
        transition: color 0.3s;
      }
      .overtime-display.idle {
        color: var(--text3);
        font-size: 34px;
      }
      .ot-note {
        font-size: 11px;
        color: var(--text3);
        text-align: center;
        line-height: 1.6;
        font-family: var(--mono);
      }

      .turn-btn {
        width: 100%;
        justify-content: center;
        font-size: 12px;
        margin-top: 0.875rem;
        letter-spacing: 0.05em;
        font-family: var(--mono);
        text-transform: uppercase;
      }
      .turn-btn.hot {
        border-color: var(--red) !important;
        color: var(--red) !important;
      }
      .turn-btn.hot:hover:not(:disabled) {
        background: rgba(240, 96, 96, 0.08) !important;
      }

      /* ── agenda section ── */
      .section {
        background: var(--bg2);
        border: 0.5px solid var(--line);
        border-radius: var(--r2);
        padding: 1rem 1.25rem;
        margin-bottom: 1rem;
      }
      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.875rem;
      }
      .section-title {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text3);
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      /* agenda items list */
      .agenda-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 0.75rem;
      }

      .agenda-item {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 8px;
        align-items: center;
        padding: 7px 10px;
        background: var(--bg3);
        border-radius: var(--r);
        border: 0.5px solid transparent;
        transition:
          border-color 0.2s,
          background 0.2s;
      }
      .agenda-item.active-item {
        border-color: var(--accent);
        background: rgba(200, 240, 96, 0.05);
      }
      .agenda-item.done-item {
        opacity: 0.4;
      }
      .agenda-item .item-name {
        font-size: 13px;
        color: var(--text);
      }
      .agenda-item .item-dur {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text2);
        background: var(--bg4);
        padding: 2px 8px;
        border-radius: 4px;
        white-space: nowrap;
      }
      .agenda-item .item-remove {
        background: transparent;
        border: none;
        color: var(--text3);
        cursor: pointer;
        padding: 2px 4px;
        border-radius: 4px;
        display: flex;
        align-items: center;
        transition:
          color 0.15s,
          background 0.15s;
      }
      .agenda-item .item-remove:hover {
        color: var(--red);
        background: rgba(240, 96, 96, 0.08);
      }
      .agenda-item .item-used {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text3);
        background: var(--bg4);
        padding: 2px 8px;
        border-radius: 4px;
        white-space: nowrap;
      }

      /* add item form */
      .add-item-row {
        display: grid;
        grid-template-columns: 1fr 90px auto;
        gap: 8px;
        align-items: center;
      }

      /* progress bar */
      .agenda-progress {
        height: 2px;
        background: var(--bg3);
        border-radius: 1px;
        margin-top: 0.5rem;
        overflow: hidden;
        display: none;
      }
      .agenda-progress.visible {
        display: block;
      }
      .agenda-progress-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 1px;
        transition: width 0.5s;
      }

      /* ── controls section ── */
      .controls-grid {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        flex-wrap: wrap;
      }
      .mode-label {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text3);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 0.5rem;
      }

      .inp-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
        flex: 1;
        min-width: 120px;
      }
      .inp-group label {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text3);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      input[type="number"],
      input[type="text"] {
        height: 36px;
        border-radius: var(--r);
        border: 0.5px solid var(--line2);
        background: var(--bg3);
        color: var(--text);
        padding: 0 10px;
        font-size: 13px;
        font-family: var(--sans);
        outline: none;
        transition: border-color 0.15s;
        width: 100%;
      }
      input:focus {
        border-color: var(--accent);
      }
      input::placeholder {
        color: var(--text3);
      }
      input:disabled {
        opacity: 0.4;
        pointer-events: none;
      }

      button {
        height: 36px;
        padding: 0 1rem;
        border-radius: var(--r);
        border: 0.5px solid var(--line2);
        background: transparent;
        color: var(--text2);
        font-size: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: var(--mono);
        letter-spacing: 0.04em;
        transition:
          background 0.15s,
          color 0.15s,
          border-color 0.15s,
          opacity 0.15s;
        white-space: nowrap;
      }
      button:hover:not(:disabled) {
        background: var(--bg3);
        color: var(--text);
      }
      button:active:not(:disabled) {
        transform: scale(0.98);
      }
      button:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      button.primary {
        background: var(--accent);
        color: var(--bg);
        border-color: transparent;
        font-weight: 500;
      }
      button.primary:hover:not(:disabled) {
        background: #d4f470;
        color: var(--bg);
      }
      button.icon-btn {
        width: 36px;
        padding: 0;
        justify-content: center;
        flex-shrink: 0;
      }

      /* ── log ── */
      .log-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 4px;
        max-height: 160px;
        overflow-y: auto;
      }
      .log-item {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text2);
        padding: 5px 10px;
        background: var(--bg3);
        border-radius: var(--r);
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .log-item .log-n {
        color: var(--text3);
        min-width: 20px;
      }
      .log-item .log-name {
        flex: 1;
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .log-item .log-tag {
        font-size: 10px;
        padding: 1px 7px;
        border-radius: 10px;
        border: 0.5px solid var(--line2);
      }
      .log-item .log-tag.ok {
        border-color: var(--accent);
        color: var(--accent);
      }
      .log-item .log-tag.bad {
        border-color: var(--red);
        color: var(--red);
      }
      .log-item .log-budget {
        font-size: 10px;
        color: var(--text3);
        white-space: nowrap;
      }
      .log-item .log-used {
        font-size: 11px;
        color: var(--text2);
        white-space: nowrap;
      }

      /* ── empty state ── */
      .empty-state {
        text-align: center;
        padding: 1.5rem 1rem;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text3);
      }

      /* ── mode toggle ── */
      .mode-tabs {
        display: flex;
        gap: 4px;
        background: var(--bg3);
        padding: 3px;
        border-radius: var(--r);
        margin-bottom: 0.875rem;
      }
      .mode-tab {
        flex: 1;
        height: 28px;
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        color: var(--text3);
        background: transparent;
        transition: all 0.15s;
      }
      .mode-tab.active {
        background: var(--bg2);
        color: var(--text);
        border: 0.5px solid var(--line2);
      }
      .mode-tab:hover:not(.active) {
        color: var(--text2);
      }

      .mode-panel {
        display: none;
      }
      .mode-panel.active {
        display: block;
      }

      /* scrollbar */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--bg4);
        border-radius: 2px;
      }

      /* ── total-bar right ── */
      .total-bar-right {
        text-align: right;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 6px;
      }
      .total-set {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text3);
      }

      /* ── mobile ── */
      @media (max-width: 560px) {
        .app {
          padding: 0 0.75rem 4rem;
        }
        header {
          padding: 1.25rem 0 1rem;
        }
        .clocks-row {
          grid-template-columns: 1fr;
        }
        svg.analog {
          width: 120px;
          height: 120px;
        }
        .total-time {
          font-size: 26px;
        }
        .overtime-display {
          font-size: 32px;
        }
        button,
        input[type="number"],
        input[type="text"] {
          height: 44px;
        }
        .mode-tab {
          height: 36px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <span class="logo">Talk Turn Timer</span>
        <span class="logo-sep">—</span>
        <span class="logo-sub">대화 발화 시간 관리 도구</span>
      </header>

      <!-- 전체 시간 표시 -->
      <div class="total-bar" id="totalBar">
        <div>
          <div class="total-label">전체 대화 시간 남음</div>
          <div class="total-time" id="totalDisplay">--:--</div>
        </div>
        <div class="total-bar-right">
          <span class="status-pill" id="statusPill">대기 중</span>
          <span class="total-set" id="totalSet">미설정</span>
        </div>
      </div>

      <!-- 현재 아이템 배너 -->
      <div class="current-item" id="currentItemBanner">
        <span class="ci-index" id="ciBannerIdx">1/3</span>
        <span class="ci-name" id="ciBannerName">—</span>
        <span class="ci-time" id="ciBannerTime">—</span>
      </div>

      <!-- 두 시계 -->
      <div class="clocks-row">
        <div class="clock-card">
          <div class="clabel">발화 제한시간</div>
          <svg
            class="analog"
            width="140"
            height="140"
            viewBox="0 0 140 140"
            id="analogClock"
          >
            <circle
              cx="70"
              cy="70"
              r="64"
              fill="none"
              stroke="rgba(255,255,255,0.06)"
              stroke-width="1"
            />
            <g id="ticks"></g>
            <circle
              id="arcRemain"
              cx="70"
              cy="70"
              r="56"
              fill="none"
              stroke="#60c8f0"
              stroke-width="5"
              stroke-dasharray="351.86"
              stroke-dashoffset="0"
              stroke-linecap="round"
              transform="rotate(-90 70 70)"
            />
            <line
              id="minHand"
              x1="70"
              y1="70"
              x2="70"
              y2="18"
              stroke="#f0ede6"
              stroke-width="2"
              stroke-linecap="round"
            />
            <line
              id="secHand"
              x1="70"
              y1="70"
              x2="70"
              y2="14"
              stroke="#f06060"
              stroke-width="1"
              stroke-linecap="round"
            />
            <circle cx="70" cy="70" r="3" fill="#f0ede6" />
          </svg>
          <div class="csub" id="analogLabel">--:--</div>
        </div>

        <div class="clock-card">
          <div class="clabel">초과 시간</div>
          <div class="overtime-display idle" id="overtimeDisplay">00:00</div>
          <div class="ot-note" id="overtimeNote">
            발화 제한시간 종료 후<br />카운트업 시작
          </div>
          <button class="turn-btn" id="turnBtn" disabled>
            <i class="ti ti-arrow-right"></i> 대화 넘기기
          </button>
        </div>
      </div>

      <!-- 탭 -->
      <div class="section">
        <div class="mode-tabs">
          <button
            class="mode-tab active"
            id="tabSetup"
            onclick="switchTab('setup')"
          >
            설정
          </button>
          <button class="mode-tab" id="tabAgenda" onclick="switchTab('agenda')">
            타임박싱
          </button>
          <button class="mode-tab" id="tabLog" onclick="switchTab('log')">
            기록
          </button>
        </div>

        <!-- 설정 탭 -->
        <div class="mode-panel active" id="panelSetup">
          <div class="mode-label">기본 시간 설정</div>
          <div
            style="
              display: flex;
              gap: 0.75rem;
              margin-bottom: 0.875rem;
              flex-wrap: wrap;
            "
          >
            <div class="inp-group">
              <label>전체 대화 시간 (분)</label>
              <input
                type="number"
                id="totalMin"
                value="60"
                min="1"
                max="600"
                placeholder="60"
              />
            </div>
            <div class="inp-group">
              <label>발화 제한시간 (분)</label>
              <input
                type="number"
                id="limitMin"
                value="20"
                min="1"
                max="600"
                placeholder="20"
              />
            </div>
          </div>
          <div
            id="setupHint"
            style="
              font-family: var(--mono);
              font-size: 10px;
              color: var(--text3);
              margin-bottom: 0.875rem;
              padding: 8px 10px;
              background: var(--bg3);
              border-radius: var(--r);
              line-height: 1.7;
            "
          >
            타임박싱 아이템이 있으면 전체 대화 시간은 아이템 합산으로 자동
            계산됩니다.<br />
            발화 제한시간은 아이템이 없을 때만 적용됩니다.
          </div>
          <div class="controls-grid">
            <button class="primary" id="startBtn" style="flex: 1">
              <i class="ti ti-player-play"></i> 시작
            </button>
            <button id="pauseBtn" disabled style="flex: 1">
              <i class="ti ti-player-pause"></i> 일시정지
            </button>
            <button
              id="resetBtn"
              style="border-color: rgba(240, 96, 96, 0.3); color: #f06060"
            >
              <i class="ti ti-refresh"></i> 초기화
            </button>
          </div>
        </div>

        <!-- 타임박싱 탭 -->
        <div class="mode-panel" id="panelAgenda">
          <div class="section-header">
            <span class="section-title">아이템 목록</span>
            <span
              style="
                font-family: var(--mono);
                font-size: 10px;
                color: var(--text3);
              "
              id="agendaTotalLabel"
            ></span>
          </div>
          <div class="agenda-list" id="agendaList">
            <div class="empty-state" id="agendaEmpty">
              아직 아이템이 없어요.<br />아래에서 추가해 주세요.
            </div>
          </div>
          <div class="agenda-progress" id="agendaProgress">
            <div
              class="agenda-progress-fill"
              id="agendaProgressFill"
              style="width: 0%"
            ></div>
          </div>
          <div style="height: 0.75rem"></div>
          <div
            style="
              font-family: var(--mono);
              font-size: 10px;
              color: var(--text3);
              margin-bottom: 0.5rem;
              text-transform: uppercase;
              letter-spacing: 0.08em;
            "
          >
            새 아이템 추가
          </div>
          <div class="add-item-row">
            <input
              type="text"
              id="newItemName"
              placeholder="예: 여행지 브레인스토밍"
              maxlength="40"
            />
            <input
              type="number"
              id="newItemMin"
              placeholder="분"
              min="1"
              max="300"
            />
            <button class="icon-btn" id="addItemBtn" title="추가">
              <i class="ti ti-plus"></i>
            </button>
          </div>
        </div>

        <!-- 기록 탭 -->
        <div class="mode-panel" id="panelLog">
          <div class="section-header">
            <span class="section-title">대화 넘기기 기록</span>
            <button
              class="icon-btn"
              id="clearLogBtn"
              title="기록 지우기"
              style="
                width: auto;
                padding: 0 8px;
                font-size: 10px;
                font-family: var(--mono);
              "
            >
              <i class="ti ti-trash"></i>
            </button>
          </div>
          <ul class="log-list" id="logList">
            <li class="empty-state" id="logEmpty">아직 기록이 없어요.</li>
          </ul>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const CIRC = 2 * Math.PI * 56;

        // ── state ──
        let agenda = []; // [{name, minutes}]
        let agendaIdx = 0; // current agenda item index
        let useAgenda = false;

        let totalSec = 0,
          limitSec = 0;
        let totalRemain = 0,
          limitRemain = 0,
          overtimeSec = 0;
        let phase = "idle"; // idle | countdown | overtime | done
        let paused = false;
        let ticker = null;
        let turnCount = 0;
        let logs = [];

        // ── dom ──
        const $ = (id) => document.getElementById(id);

        // draw ticks
        (function () {
          const g = $("ticks");
          for (let i = 0; i < 60; i++) {
            const a = (i / 60) * 2 * Math.PI - Math.PI / 2;
            const maj = i % 5 === 0;
            const r1 = maj ? 57 : 61;
            const ln = document.createElementNS(
              "http://www.w3.org/2000/svg",
              "line",
            );
            ln.setAttribute("x1", (70 + r1 * Math.cos(a)).toFixed(2));
            ln.setAttribute("y1", (70 + r1 * Math.sin(a)).toFixed(2));
            ln.setAttribute("x2", (70 + 64 * Math.cos(a)).toFixed(2));
            ln.setAttribute("y2", (70 + 64 * Math.sin(a)).toFixed(2));
            ln.setAttribute(
              "stroke",
              maj ? "rgba(255,255,255,0.25)" : "rgba(255,255,255,0.08)",
            );
            ln.setAttribute("stroke-width", maj ? "1.5" : "0.5");
            g.appendChild(ln);
          }
        })();

        function fmt(sec) {
          const m = Math.floor(Math.abs(sec) / 60);
          const s = Math.abs(sec) % 60;
          return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
        }

        function updateAnalog(remain, total) {
          if (total <= 0) return;
          const frac = Math.max(0, remain / total);
          $("arcRemain").setAttribute(
            "stroke-dashoffset",
            (CIRC * (1 - frac)).toFixed(2),
          );
          $("arcRemain").setAttribute(
            "stroke",
            frac < 0.2 ? "#f06060" : frac < 0.4 ? "#f0b060" : "#60c8f0",
          );

          const minA = (1 - frac) * 360 - 90;
          const mR = (minA * Math.PI) / 180;
          $("minHand").setAttribute("x2", (70 + 52 * Math.cos(mR)).toFixed(2));
          $("minHand").setAttribute("y2", (70 + 52 * Math.sin(mR)).toFixed(2));

          const secFrac = (remain % 60) / 60;
          const sA = (1 - secFrac) * 360 - 90;
          const sR = (sA * Math.PI) / 180;
          $("secHand").setAttribute("x2", (70 + 56 * Math.cos(sR)).toFixed(2));
          $("secHand").setAttribute("y2", (70 + 56 * Math.sin(sR)).toFixed(2));
        }

        function pill(text, cls) {
          const el = $("statusPill");
          el.textContent = text;
          el.className = "status-pill" + (cls ? " " + cls : "");
        }

        // ── agenda UI ──
        function renderAgenda() {
          const list = $("agendaList");
          $("agendaEmpty").style.display = agenda.length ? "none" : "block";
          // remove old items
          list.querySelectorAll(".agenda-item").forEach((e) => e.remove());

          const total = agenda.reduce((a, i) => a + i.minutes, 0);
          $("agendaTotalLabel").textContent = agenda.length
            ? `총 ${total}분 / ${agenda.length}개`
            : "";

          agenda.forEach((item, idx) => {
            const isDone = phase !== "idle" && idx < agendaIdx;
            const doneLog = isDone ? logs[idx] : null;
            const durText = doneLog
              ? `${fmt(doneLog.usedSec)} / ${item.minutes}분`
              : `${item.minutes}분`;
            const row = document.createElement("div");
            row.className =
              "agenda-item" +
              (phase !== "idle" && idx === agendaIdx ? " active-item" : "") +
              (isDone ? " done-item" : "");
            row.innerHTML = `
        <span class="item-name">${escHtml(item.name)}</span>
        <span class="item-dur${doneLog ? " item-used" : ""}">${durText}</span>
        <button class="item-remove" data-idx="${idx}" title="삭제" ${phase !== "idle" ? "disabled" : ""}>
          <i class="ti ti-x" style="font-size:12px;"></i>
        </button>`;
            list.appendChild(row);
          });

          // progress
          if (phase !== "idle" && agenda.length) {
            $("agendaProgress").className = "agenda-progress visible";
            const pct = (agendaIdx / agenda.length) * 100;
            $("agendaProgressFill").style.width = pct + "%";
          } else {
            $("agendaProgress").className = "agenda-progress";
          }

          // remove listeners
          list.querySelectorAll(".item-remove").forEach((btn) => {
            btn.addEventListener("click", () => {
              const i = parseInt(btn.dataset.idx);
              agenda.splice(i, 1);
              renderAgenda();
              syncLimitInput();
            });
          });
        }

        function escHtml(s) {
          return s
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
        }

        function syncLimitInput() {
          if (phase !== "idle") return;
          const hasAgenda = agenda.length > 0;
          $("limitMin").disabled = hasAgenda;
          $("setupHint").innerHTML = hasAgenda
            ? "타임박싱 아이템이 있으면 전체 대화 시간은 아이템 합산으로 자동 계산됩니다.<br />발화 제한시간은 각 아이템 시간으로 자동 설정됩니다."
            : "타임박싱 아이템이 있으면 전체 대화 시간은 아이템 합산으로 자동 계산됩니다.<br />발화 제한시간은 아이템이 없을 때만 적용됩니다.";
        }

        $("addItemBtn").addEventListener("click", () => {
          const name = $("newItemName").value.trim();
          const min = parseInt($("newItemMin").value);
          if (!name || !min || min < 1) return;
          agenda.push({ name, minutes: min });
          $("newItemName").value = "";
          $("newItemMin").value = "";
          $("newItemName").focus();
          renderAgenda();
          syncLimitInput();
        });
        $("newItemName").addEventListener("keydown", (e) => {
          if (e.key === "Enter") $("newItemMin").focus();
        });
        $("newItemMin").addEventListener("keydown", (e) => {
          if (e.key === "Enter") $("addItemBtn").click();
        });

        // ── banner ──
        function updateBanner() {
          if (phase === "idle" || phase === "done") {
            $("currentItemBanner").classList.remove("visible");
            return;
          }
          if (agenda.length && useAgenda) {
            const item = agenda[agendaIdx];
            $("ciBannerIdx").textContent =
              `${agendaIdx + 1} / ${agenda.length}`;
            $("ciBannerName").textContent = item.name;
            $("ciBannerTime").textContent = `${item.minutes}분`;
            $("currentItemBanner").classList.add("visible");
          } else {
            $("currentItemBanner").classList.remove("visible");
          }
        }

        // ── timer ──
        function startSession() {
          useAgenda = agenda.length > 0;

          if (useAgenda) {
            totalSec = agenda.reduce((a, i) => a + i.minutes, 0) * 60;
            limitSec = Math.max(1, parseInt($("limitMin").value) || 20) * 60;
            agendaIdx = 0;
            // set limit to current item's time if item time < limitSec
            limitSec = Math.min(limitSec, agenda[0].minutes * 60);
            limitSec = agenda[0].minutes * 60; // actually use item's full time as the clock
          } else {
            totalSec = Math.max(1, parseInt($("totalMin").value) || 60) * 60;
            limitSec = Math.max(1, parseInt($("limitMin").value) || 20) * 60;
          }

          totalRemain = totalSec;
          limitRemain = limitSec;
          overtimeSec = 0;
          phase = "countdown";
          paused = false;
          turnCount = 0;
          logs = [];
          $("logList").innerHTML =
            '<li class="empty-state" id="logEmpty">아직 기록이 없어요.</li>';
          $("turnBtn").disabled = false;
          $("turnBtn").classList.remove("hot");
          $("startBtn").disabled = true;
          $("pauseBtn").disabled = false;
          $("totalMin").disabled = true;
          $("limitMin").disabled = true;
          $("overtimeNote").textContent =
            "발화 제한시간 종료 후\n카운트업 시작";
          $("totalSet").textContent = `설정: ${Math.round(totalSec / 60)}분`;
          clearInterval(ticker);
          ticker = setInterval(tick, 1000);
          renderAgenda();
          updateBanner();
          render();
        }

        function endSession() {
          phase = "done";
          clearInterval(ticker);
          $("turnBtn").disabled = true;
          $("startBtn").disabled = false;
          $("pauseBtn").disabled = true;
          $("totalMin").disabled = false;
          $("limitMin").disabled = false;
          $("totalBar").classList.add("done");
          updateBanner();
          renderAgenda();
          render();
        }

        function tick() {
          if (paused) return;
          if (totalRemain > 0) totalRemain--;
          else {
            endSession();
            return;
          }

          if (phase === "countdown") {
            if (limitRemain > 0) limitRemain--;
            else {
              phase = "overtime";
              $("turnBtn").disabled = false;
              $("turnBtn").classList.add("hot");
            }
          } else if (phase === "overtime") {
            overtimeSec++;
          }
          render();
        }

        function logTurn() {
          if (phase === "idle" || phase === "done") return;
          turnCount++;
          const overBy = phase === "overtime" ? overtimeSec : 0;
          const budgetSec = limitSec;
          const usedSec = (limitSec - limitRemain) + (phase === "overtime" ? overtimeSec : 0);
          const itemName =
            useAgenda && agenda[agendaIdx]
              ? agenda[agendaIdx].name
              : `턴 ${turnCount}`;

          const li = document.createElement("li");
          li.className = "log-item";
          li.innerHTML = `
      <span class="log-n">${turnCount}</span>
      <span class="log-name">${escHtml(itemName)}</span>
      <span class="log-budget">${fmt(budgetSec)}</span>
      <span class="log-used">${fmt(usedSec)}</span>
      <span class="log-tag ${overBy > 0 ? "bad" : "ok"}">${overBy > 0 ? "+" + fmt(overBy) : "제한 내"}</span>`;
          const empty = $("logEmpty");
          if (empty) empty.remove();
          $("logList").prepend(li);
          logs.push({ itemName, budgetSec, usedSec, overBy });

          // advance agenda
          if (useAgenda) {
            agendaIdx++;
            if (agendaIdx >= agenda.length) {
              endSession();
              return;
            }
            limitSec = agenda[agendaIdx].minutes * 60;
          }

          limitRemain = limitSec;
          overtimeSec = 0;
          phase = "countdown";
          $("turnBtn").classList.remove("hot");
          $("overtimeNote").textContent =
            "발화 제한시간 종료 후\n카운트업 시작";
          renderAgenda();
          updateBanner();
          render();
        }

        function resetAll() {
          clearInterval(ticker);
          phase = "idle";
          paused = false;
          agendaIdx = 0;
          totalRemain = 0;
          limitRemain = 0;
          overtimeSec = 0;
          $("startBtn").disabled = false;
          $("pauseBtn").disabled = true;
          $("pauseBtn").innerHTML =
            '<i class="ti ti-player-pause"></i> 일시정지';
          $("turnBtn").disabled = true;
          $("turnBtn").classList.remove("hot");
          $("totalMin").disabled = false;
          $("limitMin").disabled = false;
          syncLimitInput();
          $("totalDisplay").textContent = "--:--";
          $("analogLabel").textContent = "--:--";
          $("overtimeDisplay").textContent = "00:00";
          $("overtimeDisplay").className = "overtime-display idle";
          $("overtimeNote").textContent =
            "발화 제한시간 종료 후\n카운트업 시작";
          $("arcRemain").setAttribute("stroke-dashoffset", "0");
          $("arcRemain").setAttribute("stroke", "#60c8f0");
          $("minHand").setAttribute("x2", "70");
          $("minHand").setAttribute("y2", "18");
          $("secHand").setAttribute("x2", "70");
          $("secHand").setAttribute("y2", "14");
          $("totalSet").textContent = "미설정";
          $("totalBar").className = "total-bar";
          pill("대기 중", "");
          $("currentItemBanner").classList.remove("visible");
          renderAgenda();
        }

        function render() {
          $("totalDisplay").textContent = fmt(totalRemain);
          $("totalBar").className =
            "total-bar" +
            (phase === "overtime" ? " over" : phase === "done" ? " done" : "");

          if (phase === "countdown") {
            $("analogLabel").textContent = fmt(limitRemain);
            updateAnalog(limitRemain, limitSec);
            $("overtimeDisplay").textContent = "00:00";
            $("overtimeDisplay").className = "overtime-display idle";
            pill(paused ? "일시정지" : "발화 중", paused ? "paused" : "active");
          } else if (phase === "overtime") {
            $("analogLabel").textContent = "00:00";
            updateAnalog(0, limitSec);
            $("overtimeDisplay").textContent = fmt(overtimeSec);
            $("overtimeDisplay").className = "overtime-display";
            $("overtimeNote").textContent = "제한시간 초과";
            pill(paused ? "일시정지" : "초과 중", paused ? "paused" : "over");
          } else if (phase === "done") {
            pill("세션 종료", "");
          }
        }

        // ── tab ──
        window.switchTab = function (name) {
          ["setup", "agenda", "log"].forEach((t) => {
            $("tab" + t.charAt(0).toUpperCase() + t.slice(1)).className =
              "mode-tab" + (t === name ? " active" : "");
            $("panel" + t.charAt(0).toUpperCase() + t.slice(1)).className =
              "mode-panel" + (t === name ? " active" : "");
          });
        };

        // ── events ──
        $("startBtn").addEventListener("click", startSession);
        $("pauseBtn").addEventListener("click", () => {
          if (phase === "idle" || phase === "done") return;
          paused = !paused;
          $("pauseBtn").innerHTML = paused
            ? '<i class="ti ti-player-play"></i> 재개'
            : '<i class="ti ti-player-pause"></i> 일시정지';
          render();
        });
        $("resetBtn").addEventListener("click", resetAll);
        $("turnBtn").addEventListener("click", logTurn);
        $("clearLogBtn").addEventListener("click", () => {
          $("logList").innerHTML =
            '<li class="empty-state" id="logEmpty">아직 기록이 없어요.</li>';
          logs = [];
        });

        renderAgenda();
        syncLimitInput();
      })();
    </script>
  </body>
</html>
